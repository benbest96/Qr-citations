const quotes = [
"Un ordinateur bien traité dure plus longtemps.",
"Le matériel informatique est pour tous les élèves.",
"Un câble tiré peut arrêter une classe entière.",
"Luc 16:10 — Fidèle dans les petites choses.",
"Respecter le matériel, c’est respecter les autres.",
"Signalez les problèmes au lieu de les cacher."

function showQuote(){
  const i = Math.floor(Math.random()*quotes.length);
  document.getElementById("quote").innerText = quotes[i];
}

showQuote();
